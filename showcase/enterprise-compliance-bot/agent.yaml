name: enterprise-compliance-bot
version: "1.0"
description: Compliance-focused agent with policy governance

model:
  provider: openai
  name: gpt-4o-mini
  temperature: 0.2

autonomy_level: 2

tools:
  - name: echo
    version: "1"
  - name: calc
    version: "1"
  - name: http_request
    version: "1"

policy: ./policy.yaml

memory:
  persistent: false
  semantic: false

max_steps: 10
timeout: 60s
