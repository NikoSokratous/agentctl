name: research-assistant
version: "1.0"
description: Multi-step research and summarization agent

model:
  provider: openai
  name: gpt-4o
  temperature: 0.5

autonomy_level: 3  # Autonomous - minimal human intervention

tools:
  - name: http_request
    version: "1"

policy: ./policy.yaml

memory:
  persistent: true
  semantic: true

max_steps: 50
timeout: 600s
