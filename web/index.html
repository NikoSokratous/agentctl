<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AgentRuntime - Enterprise orchestration for autonomous AI agents" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>AgentRuntime - Control Panel</title>
    <style>
      body { margin: 0; padding: 0; background: #0c0c0e; color: #e4e4e7; font-family: 'DM Sans', system-ui, sans-serif; }
      #root { min-height: 100vh; }
      .loading-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-size: 0.9375rem; color: #71717a; }
      .loading-splash .spinner { width: 36px; height: 36px; border: 2px solid #27272a; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-splash">
        <div class="spinner"></div>
        <span>Loading AgentRuntime...</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
