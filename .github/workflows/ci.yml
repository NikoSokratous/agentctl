name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Go
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -coverprofile=coverage.out ./...

    - name: Test Go SDK
      run: |
        cd sdk/go
        go mod tidy
        go test ./... -v

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        fail_ci_if_error: false

  test-python:
    name: Test Python SDK
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd sdk/python
        pip install -e ".[dev]"

    - name: Run Python tests
      run: |
        cd sdk/python
        pytest tests/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build agentctl
      run: go build -o bin/agentctl ./cmd/agentctl

    - name: Build agentd
      run: go build -o bin/agentd ./cmd/agentd

    - name: Test CLI commands
      run: |
        ./bin/agentctl --help
        ./bin/agentctl tool --help
        ./bin/agentctl policy --help
        ./bin/agentctl agent --help
        ./bin/agentctl webhook --help
        ./bin/agentctl workflow --help
        ./bin/agentctl plugin --help

    - name: Validate example configs
      run: |
        ./bin/agentctl agent test --config examples/cli-assistant/agent.yaml || true
        ./bin/agentctl policy validate --policy examples/cli-assistant/policy.yaml
        ./bin/agentctl workflow validate --config examples/multi-agent-workflow/research-workflow.yaml

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: bin/
  
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run integration tests
      run: go test ./tests/integration -v -timeout 10m
      env:
        REDIS_URL: redis://localhost:6379
        QDRANT_URL: http://localhost:6333
  
  build-webui:
    name: Build Web UI
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm ci

    - name: Build Web UI
      run: |
        cd web
        npm run build

    - name: Upload Web UI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webui
        path: web/dist/
  
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: docker build -f deploy/Dockerfile -t agentruntime:test .

